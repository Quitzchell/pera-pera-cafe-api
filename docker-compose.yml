services:
  app:
    build:
      context: .
      dockerfile: ./Dockerfile.dev
    container_name: pera-pera-cafe-nest
    ports:
      - '3000:3000'
    env_file:
      - .env
    volumes:
      - .:/app
      - ./node_modules:/app/node_modules

networks:
  default:
    external: true
    name: postgres-17_default