services:
  app:
    build:
      context: .
      dockerfile: Dockerfile.prod
    container_name: pera-app
    restart: unless-stopped
    environment:
      DATABASE_URL: postgresql://${PERA_DB_USER:?required}:${PERA_DB_PASSWORD:?required}@postgres:5432/${PERA_DB_NAME:?required}?schema=public
      NODE_ENV: production
      CORS_ORIGIN: ${CORS_ORIGIN:?required}
    networks:
      - web
      - postgres-net

networks:
  web:
    external: true
  postgres-net:
    external: true

